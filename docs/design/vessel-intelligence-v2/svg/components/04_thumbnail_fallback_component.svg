<rect width="760" height="480" fill="url(#bg)"/><text x="30" y="44" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="800" fill="#e9f2ff" fill-opacity="1" text-anchor="start">Thumbnail Fallback Component</text><text x="30" y="72" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="400" fill="#9cb2c9" fill-opacity="1" text-anchor="start">Applies to section and equipment thumbnails.</text><rect x="50" y="120" width="300" height="260" rx="14" fill="url(#card)" fill-opacity="1" stroke="#1d405f" stroke-width="1"/><text x="70" y="155" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="700" fill="#e9f2ff" fill-opacity="1" text-anchor="start">Section thumbnail fallback</text><text x="70" y="205" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="400" fill="#e9f2ff" fill-opacity="1" text-anchor="start">1. Manual section thumbnail</text><text x="70" y="235" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="400" fill="#9cb2c9" fill-opacity="1" text-anchor="start">2. Crop from active diagram</text><text x="70" y="265" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="400" fill="#9cb2c9" fill-opacity="1" text-anchor="start">3. Generated placeholder</text><text x="70" y="295" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="400" fill="#9cb2c9" fill-opacity="1" text-anchor="start">4. Generic section icon</text><rect x="410" y="120" width="300" height="260" rx="14" fill="url(#card)" fill-opacity="1" stroke="#1d405f" stroke-width="1"/><text x="430" y="155" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="700" fill="#e9f2ff" fill-opacity="1" text-anchor="start">Equipment thumbnail fallback</text><text x="430" y="205" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="400" fill="#e9f2ff" fill-opacity="1" text-anchor="start">1. Manual equipment thumbnail</text><text x="430" y="235" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="400" fill=