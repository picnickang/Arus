name: Argos CI - Visual Regression for Mobile Web

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  visual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests + Argos Upload
        run: npx playwright test --project=mobile-visual
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}

      - name: Upload Argos report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: argos-report
          path: argos-report/
          retention-days: 7
