name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            name: macOS Apple Silicon
          - target: x86_64-apple-darwin
            name: macOS Intel

    name: ${{ matrix.name }}
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: '${{ matrix.target }}' }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: src-tauri }

      - name: Install brew dependencies
        run: brew install imagemagick

      - run: npm ci

      - name: Generate icons
        run: |
          node scripts/generate-icons.mjs
          iconutil -c icns src-tauri/icons/icon.iconset \
                   -o src-tauri/icons/icon.icns

      - name: Build sidecar
        run: node scripts/build-sidecar.mjs

      - name: Build Tauri (vessel config)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:                       ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY:             ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                           ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:                     ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:                      ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName:      ${{ github.ref_name }}
          releaseName:  'ARUS Marine ${{ github.ref_name }}'
          releaseDraft: true
          prerelease:   false
          args:         --target ${{ matrix.target }} --config src-tauri/tauri.vessel.conf.json

  build-linux:
    name: Linux x64
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: src-tauri }

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf build-essential curl wget file libssl-dev \
            libayatana-appindicator3-dev imagemagick

      - run: npm ci

      - name: Generate icons
        run: |
          node scripts/generate-icons.mjs
          convert src-tauri/icons/32x32.png \
                  src-tauri/icons/128x128.png \
                  src-tauri/icons/icon.png \
                  src-tauri/icons/icon.ico || true

      - name: Build sidecar
        run: node scripts/build-sidecar.mjs

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:                       ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName:      ${{ github.ref_name }}
          releaseName:  'ARUS Marine ${{ github.ref_name }}'
          releaseDraft: true
          prerelease:   false
          args:         --target x86_64-unknown-linux-gnu --config src-tauri/tauri.vessel.conf.json

  build-windows-vessel:
    name: Windows x64 (Vessel)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: src-tauri }

      - name: Install ImageMagick
        shell: pwsh
        run: choco install imagemagick -y --no-progress

      - run: npm ci

      - name: Generate icons
        shell: pwsh
        run: |
          node scripts/generate-icons.mjs
          magick convert `
            src-tauri/icons/32x32.png `
            src-tauri/icons/128x128.png `
            src-tauri/icons/icon.png `
            src-tauri/icons/icon.ico

      - name: Build sidecar (Windows)
        run: node scripts/build-sidecar.mjs

      - name: Download and verify NSSM
        shell: pwsh
        run: |
          $nssmUrl = "https://nssm.cc/release/nssm-2.24.zip"
          $expectedHash = "6C382953E82F81C19D75D4F9BCD653F9C253EFE2C2E0C0C569999F15BBAE8F7F"
          $zip = "$env:TEMP\nssm.zip"
          Invoke-WebRequest -Uri $nssmUrl -OutFile $zip -UseBasicParsing
          $actualHash = (Get-FileHash -Path $zip -Algorithm SHA256).Hash
          if ($actualHash -ne $expectedHash) {
            Write-Error "NSSM SHA-256 mismatch! Expected: $expectedHash  Got: $actualHash"
            exit 1
          }
          Write-Host "NSSM SHA-256 verified: $actualHash"
          Expand-Archive -Path $zip -DestinationPath "$env:TEMP\nssm" -Force
          New-Item -ItemType Directory -Force -Path "src-tauri\windows\bin" | Out-Null
          Copy-Item "$env:TEMP\nssm\nssm-2.24\win64\nssm.exe" `
                    "src-tauri\windows\bin\nssm.exe"

      - name: Download WebView2 offline installer
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" `
            -OutFile "src-tauri\MicrosoftEdgeWebview2Setup.exe" `
            -UseBasicParsing
          Write-Host "WebView2 size: $((Get-Item src-tauri\MicrosoftEdgeWebview2Setup.exe).Length) bytes"

      - name: Stage WiX resources
        shell: pwsh
        run: |
          $resourcesDir = "src-tauri\target\release\bundle\wix\resources"
          New-Item -ItemType Directory -Force -Path $resourcesDir | Out-Null
          Copy-Item "src-tauri\windows\bin\nssm.exe" `
                    "$resourcesDir\nssm.exe" -Force
          Copy-Item "src-tauri\binaries\arus-server-x86_64-pc-windows-msvc.exe" `
                    "$resourcesDir\arus-server.exe" -Force
          Write-Host "WiX resources staged:"
          Get-ChildItem $resourcesDir

      - name: Build Tauri (vessel installer)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:                       ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName:      ${{ github.ref_name }}
          releaseName:  'ARUS Marine ${{ github.ref_name }}'
          releaseDraft: true
          prerelease:   false
          args:         --target x86_64-pc-windows-msvc --config src-tauri/tauri.vessel.conf.json

  build-windows-cloud:
    name: Windows x64 (Cloud)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: src-tauri }

      - name: Install ImageMagick
        shell: pwsh
        run: choco install imagemagick -y --no-progress

      - run: npm ci

      - name: Generate icons
        shell: pwsh
        run: |
          node scripts/generate-icons.mjs
          magick convert `
            src-tauri/icons/32x32.png `
            src-tauri/icons/128x128.png `
            src-tauri/icons/icon.png `
            src-tauri/icons/icon.ico

      - name: Build sidecar
        run: node scripts/build-sidecar.mjs

      - name: Download and verify NSSM
        shell: pwsh
        run: |
          $nssmUrl = "https://nssm.cc/release/nssm-2.24.zip"
          $expectedHash = "6C382953E82F81C19D75D4F9BCD653F9C253EFE2C2E0C0C569999F15BBAE8F7F"
          $zip = "$env:TEMP\nssm.zip"
          Invoke-WebRequest -Uri $nssmUrl -OutFile $zip -UseBasicParsing
          $actualHash = (Get-FileHash -Path $zip -Algorithm SHA256).Hash
          if ($actualHash -ne $expectedHash) {
            Write-Error "NSSM SHA-256 mismatch! Expected: $expectedHash  Got: $actualHash"
            exit 1
          }
          Write-Host "NSSM SHA-256 verified: $actualHash"
          Expand-Archive -Path $zip -DestinationPath "$env:TEMP\nssm" -Force
          New-Item -ItemType Directory -Force -Path "src-tauri\windows\bin" | Out-Null
          Copy-Item "$env:TEMP\nssm\nssm-2.24\win64\nssm.exe" `
                    "src-tauri\windows\bin\nssm.exe"

      - name: Stage WiX resources
        shell: pwsh
        run: |
          $resourcesDir = "src-tauri\target\release\bundle\wix\resources"
          New-Item -ItemType Directory -Force -Path $resourcesDir | Out-Null
          Copy-Item "src-tauri\windows\bin\nssm.exe" `
                    "$resourcesDir\nssm.exe" -Force
          Copy-Item "src-tauri\binaries\arus-server-x86_64-pc-windows-msvc.exe" `
                    "$resourcesDir\arus-server.exe" -Force
          Write-Host "WiX resources staged:"
          Get-ChildItem $resourcesDir

      - name: Build Tauri (cloud installer)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:                       ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName:      ${{ github.ref_name }}
          releaseName:  'ARUS Marine ${{ github.ref_name }}'
          releaseDraft: true
          prerelease:   false
          args:         --target x86_64-pc-windows-msvc --config src-tauri/tauri.cloud.conf.json
