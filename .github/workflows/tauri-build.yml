name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            name: macOS Apple Silicon
          - target: x86_64-apple-darwin
            name: macOS Intel

    name: ${{ matrix.name }}
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: "20", cache: "npm" }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: src-tauri }

      - name: Install brew dependencies
        run: brew install imagemagick

      - run: npm ci

      - name: Generate icons
        run: |
          node scripts/generate-icons.mjs
          iconutil -c icns src-tauri/icons/icon.iconset \
                   -o src-tauri/icons/icon.icns

      - name: Build sidecar
        run: node scripts/build-sidecar.mjs

      - name: Build Tauri (vessel config)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ARUS Marine ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --config src-tauri/tauri.vessel.conf.json

  build-linux:
    name: Linux x64
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: "20", cache: "npm" }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: src-tauri }

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf build-essential curl wget file libssl-dev \
            libayatana-appindicator3-dev imagemagick

      - run: npm ci

      - name: Generate icons
        run: |
          node scripts/generate-icons.mjs
          convert src-tauri/icons/32x32.png \
                  src-tauri/icons/128x128.png \
                  src-tauri/icons/icon.png \
                  src-tauri/icons/icon.ico || true

      - name: Build sidecar
        run: node scripts/build-sidecar.mjs

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ARUS Marine ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --target x86_64-unknown-linux-gnu --config src-tauri/tauri.vessel.conf.json

  build-windows-desktop:
    name: Windows x64 (ARUS Desktop Setup)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: "20", cache: "npm" }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: src-tauri }

      - name: Install ImageMagick
        shell: pwsh
        run: choco install imagemagick -y --no-progress

      - name: Install dependencies for Windows desktop build
        shell: pwsh
        run: |
          npm ci --ignore-scripts
          npm rebuild better-sqlite3

      - name: Generate icons
        shell: pwsh
        run: |
          node scripts/generate-icons.mjs
          magick convert `
            src-tauri/icons/32x32.png `
            src-tauri/icons/128x128.png `
            src-tauri/icons/icon.png `
            src-tauri/icons/icon.ico

      - name: Build sidecar (Windows)
        run: node scripts/build-sidecar.mjs

      - name: Build Tauri (desktop setup installer)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ARUS Marine ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc --config src-tauri/tauri.conf.json

      - name: Confirm NSIS setup exe exists
        shell: pwsh
        run: |
          $setup = Get-ChildItem "src-tauri\target" -Recurse -Filter "*.exe" |
            Where-Object { $_.FullName -match "\\bundle\\nsis\\" -and $_.Name -match "Setup" } |
            Select-Object -First 1
          if (-not $setup) {
            Write-Error "ARUS Desktop Setup.exe was not produced under the NSIS bundle output."
            exit 1
          }
          Write-Host "Found setup installer: $($setup.FullName)"

      - name: Upload ARUS Desktop setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: arus-desktop-windows-setup
          path: src-tauri\target\**\bundle\nsis\*Setup*.exe
          if-no-files-found: error

      - name: Smoke install ARUS Desktop setup
        shell: pwsh
        run: |
          $setup = Get-ChildItem "src-tauri\target" -Recurse -Filter "*.exe" |
            Where-Object { $_.FullName -match "\\bundle\\nsis\\" -and $_.Name -match "Setup" } |
            Select-Object -First 1
          if (-not $setup) {
            Write-Error "ARUS Desktop Setup.exe was not produced under the NSIS bundle output."
            exit 1
          }

          $installDir = Join-Path $env:RUNNER_TEMP "ArusDesktopSmokeInstall"
          if (Test-Path $installDir) {
            Remove-Item $installDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $installDir | Out-Null

          $install = Start-Process -FilePath $setup.FullName `
            -ArgumentList @("/S", "/D=$installDir") `
            -Wait `
            -PassThru
          if ($install.ExitCode -ne 0) {
            Write-Error "Silent install failed with exit code $($install.ExitCode)."
            exit $install.ExitCode
          }

          $appExe = Join-Path $installDir "ARUS Desktop.exe"
          if (-not (Test-Path $appExe)) {
            Write-Error "Installed app executable missing: $appExe"
            Get-ChildItem $installDir -Recurse | Select-Object FullName
            exit 1
          }

          $sidecarExe = Get-ChildItem $installDir -Recurse -Filter "arus-server*.exe" |
            Select-Object -First 1
          if (-not $sidecarExe) {
            Write-Error "Installed sidecar executable matching arus-server*.exe was not found."
            Get-ChildItem $installDir -Recurse | Select-Object FullName
            exit 1
          }

          $env:DEPLOYMENT_MODE = "VESSEL"
          $env:EMBEDDED_MODE = "true"
          $env:LOCAL_MODE = "true"
          $env:NODE_ENV = "production"
          $env:DATABASE_PATH = Join-Path $env:RUNNER_TEMP "arus-desktop-smoke.db"
          $env:PORT = "0"
          & $sidecarExe.FullName --health-check
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Installed sidecar health check failed with exit code $LASTEXITCODE."
            exit $LASTEXITCODE
          }

      - name: Smoke launch installed ARUS Desktop
        shell: pwsh
        run: |
          $installDir = Join-Path $env:RUNNER_TEMP "ArusDesktopSmokeInstall"
          $appExe = Join-Path $installDir "ARUS Desktop.exe"
          if (-not (Test-Path $appExe)) {
            Write-Error "Installed app executable missing: $appExe"
            exit 1
          }

          $process = Start-Process -FilePath $appExe -PassThru
          Start-Sleep -Seconds 10
          if ($process.HasExited) {
            Write-Error "ARUS Desktop exited during smoke launch with exit code $($process.ExitCode)."
            exit 1
          }

          Stop-Process -Id $process.Id -Force
          Write-Host "ARUS Desktop launched and stayed alive for smoke verification."
