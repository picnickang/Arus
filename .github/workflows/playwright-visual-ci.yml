name: Playwright Mobile + Visual Regression CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - 'client/src/features/mobile-readiness/**'
      - 'client/src/components/BottomNav**'
      - 'tests/e2e/mobile**'
      - 'playwright.config.ts'
      - 'docs/qa/mobile-old-ui-route-audit.md'

jobs:
  test-mobile-visual:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Mobile + Visual Regression Tests
        run: npx playwright test --grep "@mobile|@visual" --project=mobile-visual --reporter=html,line

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload failed snapshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failed-visual-snapshots
          path: test-results/
          retention-days: 14

      - name: Comment on PR (for snapshot approval)
        uses: actions/github-script@v7
        if: failure() && github.event_name == 'pull_request'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚨 Visual regression diffs detected. Run `npx playwright test --update-snapshots` locally and commit updated snapshots.'
            });
