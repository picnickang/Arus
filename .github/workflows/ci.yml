name: ARUS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arus_test
  SESSION_SECRET: ci-test-session-secret-not-for-production
  ARUS_DEPLOYMENT_MODE: CLOUD
  DISABLE_REDIS: "true"
  DISABLE_JOB_QUEUE: "true"

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run check

      - name: Typecheck test files (lane excluded from main tsconfig)
        run: npm run check:tests

      - name: Check domain boundaries & leak baseline
        run: npm run check:guards

      - name: Hexagonal storage boundary (db imports outside infrastructure)
        run: npm run check:hex-storage

      - name: Dual-schema parity (PG vs SQLite)
        run: node scripts/validate-dual-schema.mjs

      - name: TypeScript error burndown
        run: npm run check:ts-burndown

      - name: Type-cast burndown (`as any` / `as unknown as`)
        run: npm run check:cast-burndown

      - name: Explicit-any burndown
        run: npm run check:explicit-any-burndown

      - name: Lint-warnings burndown
        run: npm run check:lint-warnings

      - name: Prettier format gate (whole repo must stay formatted)
        run: npm run format:check

      - name: Code-hygiene burndown (catch-underscore, console-log, ts-ignore, ...)
        run: npm run check:hygiene

      # Boot-health validates dynamic-import safety, not DB connectivity.
      # This job has no Postgres service, but the workflow-level
      # DATABASE_URL would make the app boot against a dead PG and die in
      # initializeDatabase. Unset it so boot uses the embedded fallback.
      - name: Boot health (dynamic-import safety net)
        run: |
          unset DATABASE_URL
          npm run check:boot-health

      - name: Route module import smoke check
        run: npx tsx scripts/check-route-imports.mjs

      - name: API contract ratchet
        run: npm run check:api-contracts

      - name: Client wire-parse ratchet
        run: npm run check:client-wire-parses

      - name: Server wire-parse ratchet
        run: npm run check:server-wire-parses

      # Guards against client↔server route drift (e.g. /api/pdm/health was
      # swagger-documented and client-queried but never implemented).
      # Boots the real registerRoutes() to dump the actual route table;
      # pre-existing drift is ratcheted in scripts/route-contract-baseline.json.
      - name: Route contract (client /api refs ↔ server route table)
        run: npm run check:route-contract

      # Orphaned files/exports ratchet (e.g. PowerSTWChart was built but
      # never imported by any page until the performance view mounted it).
      # Reuses the existing knip budget so legacy debt doesn't block, but
      # NEW orphans past the budget do.
      - name: Knip — unused files/exports ratchet
        run: npm run check:dead-code

      - name: LR-1B — Tenant-gate audit (requireOrgId)
        run: npx tsx scripts/check-routes-require-orgid.ts

      - name: LR-1A — Every migration has a matching .down.sql
        run: |
          set -e
          missing=0
          for up in migrations/[0-9]*.sql; do
            case "$up" in *.down.sql) continue;; esac
            down="${up%.sql}.down.sql"
            if [ ! -f "$down" ]; then
              echo "MISSING reverse migration: $down"
              missing=$((missing+1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing migration(s) missing .down.sql — see LR-1A"
            exit 1
          fi
          echo "OK — every migration has a .down.sql"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # The ESM unit lane (--experimental-vm-modules) accumulates module heap
      # in a single process and OOMs the full suite at the 6 GB ceiling. Run in
      # three fresh shards so each process stays well under the limit.
      - name: Run unit tests (sharded)
        run: |
          npm run test:unit -- --shard=1/3
          npm run test:unit -- --shard=2/3
          npm run test:unit -- --shard=3/3
        env:
          # The unit lane peaks right at the previous 6144 MB ceiling and OOMs
          # flakily (exit 134) at the boundary; the runner has ~16 GB, so give
          # it headroom.
          NODE_OPTIONS: --max-old-space-size=8192

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        # pgvector image (Postgres 16 + the `vector` extension) so the
        # kb_chunks embedding column (vector(384)) can be created.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Enable pgvector extension
        run: psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS vector"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arus_test

      - name: Run migrations
        run: |
          npm run db:push
          npm run db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arus_test

      # Reconciled (2026-06): the harness seeds the db:push baseline + a
      # dead-table shim into a throwaway database, then proves the numbered
      # deltas replay AND reverse cleanly across two down→up cycles. Now
      # blocking. See scripts/check-migrations-reversible.sh.
      - name: LR-1A — Migration reversibility (up → down → up schema-diff)
        run: bash scripts/check-migrations-reversible.sh
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arus_test

      - name: Run integration tests
        run: npm run test:integration

      # PostgreSQL-contract lane (RLS, cross-tenant isolation, tenant quota,
      # safety-bulletin scoping) — runs against the migrated arus_test above.
      - name: Run PostgreSQL-contract integration tests
        run: npm run test:integration:postgres
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arus_test

  integration-postgres-forms:
    name: Integration Tests (Postgres forms/journeys contract lane)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Least-privilege: this lane only does checkout + npm + curl + tests.
    permissions:
      contents: read

    services:
      postgres:
        # pgvector image (Postgres 16 + the `vector` extension) so the
        # kb_chunks embedding column (vector(384)) can be created.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Enable pgvector extension
        run: psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS vector"

      # db:push only — the forms/journeys contract suites exercise the canonical
      # Drizzle schema and do not depend on the numbered SQL deltas (which are
      # not from-empty replayable; see CLAUDE.md Gotchas). RLS is not needed:
      # these tests run under the single-tenant default-org header context.
      - name: Push canonical schema
        run: npm run db:push

      - name: Seed contract fixtures
        run: node scripts/seed-integration-fixtures.mjs

      - name: Start API server (Postgres + dev-login)
        env:
          # Override the global NODE_ENV=test so the server serves via Vite
          # middleware (the suites are API-only, so no client is ever compiled)
          # instead of needing a production client build.
          NODE_ENV: development
          ARUS_DEV_LOGIN: "1"
          PORT: "5000"
          DISABLE_AGENT_SCHEDULER: "true"
          DISABLE_DIGITAL_TWIN_STARTUP: "true"
          DISABLE_EMAIL_WORKER: "true"
          DISABLE_ML_SERVICE_STARTUP: "true"
          DISABLE_MODEL_BACKED_INFERENCE: "true"
          DISABLE_OBSERVABILITY_TIMERS: "true"
          DISABLE_RATE_LIMITS: "true"
          DISABLE_SECURITY_TIMERS: "true"
          DISABLE_TELEMETRY_BATCH_WRITER: "true"
          ENABLE_BACKGROUND_JOBS: "false"
          ENABLE_SCHEDULERS: "false"
          ENABLE_SYNC_SERVICES: "false"
          ENABLE_UPDATE_SYSTEM: "false"
          EVENT_SPINE_DISABLED: "1"
          EVENT_SPINE_WORKER: "0"
          EVENT_SPINE_ANALYTICS: "0"
        run: |
          nohup npx tsx server/index.ts > /tmp/arus-server.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:5000/api/healthz >/dev/null 2>&1; then
              echo "server up after $((i * 2))s"; exit 0
            fi
            sleep 2
          done
          echo "::error::API server failed to start within 120s"; cat /tmp/arus-server.log; exit 1

      - name: Run Postgres forms/journeys contract lane
        env:
          ARUS_INTEGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arus_test
          TEST_BASE_URL: http://localhost:5000
        run: npm run test:forms

      - name: Server log on failure
        if: failure()
        run: cat /tmp/arus-server.log || true

  python-sidecar:
    name: Python ML Sidecar
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        # pgvector image (Postgres 16 + the `vector` extension) so the
        # kb_chunks embedding column (vector(384)) can be created.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: npm ci

      # Install only the sidecar's runtime deps from pyproject.toml.
      # Keeps the job under the 20-min budget; the full stack is only
      # needed for end-to-end model training, not the smoke harness.
      - name: Install Python sidecar deps
        run: |
          python -m pip install --upgrade pip
          pip install "xgboost>=3.2.0,<4" "numpy>=2.4.6,<3" "psycopg[binary]>=3.3.4,<4" \
                      "onnx>=1.21.0,<2" "onnxmltools>=1.16.0,<2" "skl2onnx>=1.20.0,<2" \
                      "scikit-learn>=1.8.0,<2" "onnxconverter-common>=1.16.0,<2"

      - name: Enable pgvector extension
        run: psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS vector"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arus_test

      - name: Apply migrations
        run: |
          npm run db:push
          npm run db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arus_test

      - name: Run Python sidecar CRUD + trainer harness
        run: node scripts/ml/test-sidecar-crud.mjs
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arus_test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-and-typecheck, unit-tests]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # NODE_ENV=production is scoped to the build/measure steps only —
      # at job level it would also make `npm ci` skip devDependencies
      # (vite lives there). Without the override, the workflow-level
      # NODE_ENV=test leaks into `vite build` (vite honours a preset
      # NODE_ENV) and React is bundled in non-production mode (+~60 kB
      # initial, +~260 kB total), so the size budgets would measure the
      # wrong artefact.
      - name: Build client
        run: npm run build:renderer
        env:
          NODE_ENV: production

      - name: Build server
        run: npm run build:server
        env:
          NODE_ENV: production

      - name: Check build artifacts
        run: |
          set -e
          test -d dist
          ls -la dist/

      # Prod-hardening Wave 5: enforce client bundle budgets so
      # accidental imports of heavy vendor libs (xlsx, recharts,
      # exceljs) into the entry bundle fail CI instead of shipping.
      # Budgets live in .size-limit.json and are tuned ~10–15% above
      # the current chunk sizes.
      - name: Check bundle size budgets
        run: npx size-limit
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: dist/public
          retention-days: 3

  e2e-smoke:
    name: E2E Smoke (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]

    services:
      postgres:
        # pgvector image (Postgres 16 + the `vector` extension) so the
        # kb_chunks embedding column (vector(384)) can be created.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # Chromium only — keeps the install + first-run under the
      # 15-minute job budget. Firefox/WebKit added when a real
      # cross-browser regression demands it.
      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Enable pgvector extension
        run: psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS vector"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arus_test

      - name: Apply migrations
        run: |
          npm run db:push
          npm run db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arus_test

      - name: Run Playwright smoke (boots dev server via webServer)
        run: npx playwright test --project=chromium
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arus_test
          PLAYWRIGHT_BASE_URL: http://localhost:5000

      # Authenticated hub smoke (@smoke): the lane needs a real backend AND the
      # dev-login button, which only exists in a Vite-DEV renderer (the webServer
      # above serves a production build that hides it). So boot a dev renderer
      # against the Postgres service and drive the smoke against it. Real /api
      # responses are exercised; the spec fails on any 5xx or non-benign console
      # error. Self-skips if dev login is unavailable, so it can never silently
      # pass on a misconfigured renderer.
      - name: Authenticated hub smoke (dev renderer + Postgres)
        run: |
          NODE_ENV=development ARUS_DEV_LOGIN=1 VITE_ARUS_DEV_LOGIN=1 \
            DISABLE_AGENT_SCHEDULER=true DISABLE_DIGITAL_TWIN_STARTUP=true DISABLE_EMAIL_WORKER=true \
            DISABLE_ML_SERVICE_STARTUP=true DISABLE_MODEL_BACKED_INFERENCE=true \
            DISABLE_OBSERVABILITY_TIMERS=true DISABLE_RATE_LIMITS=true DISABLE_REDIS=true \
            DISABLE_SECURITY_TIMERS=true DISABLE_TELEMETRY_BATCH_WRITER=true \
            ENABLE_BACKGROUND_JOBS=false ENABLE_SCHEDULERS=false ENABLE_SYNC_SERVICES=false \
            ENABLE_UPDATE_SYSTEM=false EVENT_SPINE_DISABLED=1 EVENT_SPINE_WORKER=0 \
            EVENT_SPINE_ANALYTICS=0 PORT=5000 \
            SESSION_SECRET=ci-smoke-session-secret-not-for-production \
            npx tsx server/index.ts > /tmp/arus-dev-renderer.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:5000/api/healthz >/dev/null && break
            sleep 2
          done
          npm run test:e2e:smoke
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arus_test
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
          PLAYWRIGHT_LOCAL_BACKEND: "1"
          PLAYWRIGHT_BASE_URL: http://localhost:5000

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  e2e-pdm-visual:
    name: E2E PdM Visual (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Standalone: the Playwright webServer builds the renderer itself, so this
    # screenshot-artifact job does not depend on the `build` job (and is not
    # blocked by unrelated pre-existing failures in lint-and-typecheck).

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Enable pgvector extension
        run: psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS vector"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arus_test

      - name: Apply migrations
        run: |
          npm run db:push
          npm run db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arus_test

      # Journey specs live outside the core release set, so opt them in.
      - name: Run PdM visual journey (boots dev server via webServer)
        run: PLAYWRIGHT_INCLUDE_QUARANTINE=1 npx playwright test tests/playwright/journeys/pdm-equipment-detail.spec.ts --project=chromium
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arus_test
          PLAYWRIGHT_BASE_URL: http://localhost:5000

      # Always upload the screenshots — they are the deliverable, on pass or fail.
      - name: Upload PdM visual screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdm-visual-screenshots
          path: test-results/pdm-visual/
          retention-days: 14

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pdm-visual-report
          path: playwright-report/
          retention-days: 7

  dead-code:
    name: Dead Code Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint-and-typecheck]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run knip
        run: npm run check:dead-code
