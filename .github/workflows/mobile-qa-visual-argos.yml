name: Mobile QA + Visual Regression + Argos CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    paths:
      - "client/src/features/mobile-readiness/**"
      - "client/src/components/BottomNav**"
      - "client/src/App.tsx"
      - "tests/**"
      - "playwright.config.ts"
      - "docs/qa/mobile-old-ui-route-audit.md"

jobs:
  mobile-qa:
    runs-on: ubuntu-latest
    # Gated off by default: this job uploads to Argos (argos-ci/argos-action),
    # which fails job setup ("repository not found" / missing ARGOS_TOKEN) until
    # Argos is configured. Skipping (rather than failing) keeps it non-blocking.
    # Enable by setting the repo variable ENABLE_MOBILE_VISUAL_QA=true (and the
    # ARGOS_TOKEN secret) under Settings → Secrets and variables → Actions.
    if: ${{ vars.ENABLE_MOBILE_VISUAL_QA == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Mobile + Visual + Guard Tests
        run: npx playwright test --project=mobile-visual --project=mobile-chromium --grep "@mobile|@visual|@guard"
        env:
          CI: true

      - name: Upload to Argos CI
        if: always()
        uses: argos-ci/argos-action@v2
        with:
          upload: true
          token: ${{ secrets.ARGOS_TOKEN }}

      - name: Upload Playwright Report + Snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-vrt-argos
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Comment on PR (summary)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📊 Mobile QA + VRT + Argos CI completed.\n\nReview artifacts or Argos dashboard for visual diffs.\n\nBottom nav + route safety verified.'
            });
