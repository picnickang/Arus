  # - alert: WsNightlyFanoutFailed       # needs arus_ws_fanout_nightly_success pushgateway gauge
  # - alert: WarehouseExportMissed       # needs arus_telemetry_warehouse_export_last_success_unixtime gauge
  # - alert: MigrationDriftDetected      # needs arus_schema_drift_detected gauge
  # - alert: MigrationApplyFailed        # needs arus_db_migrations_failed_total counter
  # - alert: ImportFailureRate           # needs arus_import_runs_total / _failed_total counters
