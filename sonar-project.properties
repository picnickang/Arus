# SonarCloud Configuration for ARUS Marine Application
# See: https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/ci-based-analysis/

sonar.projectKey=picnickang_ARUSAPP
sonar.organization=picnickang

# Project metadata
sonar.projectName=ARUS Marine
sonar.projectVersion=1.0

# Source configuration
sonar.sources=server,shared,client/src,electron,scripts
sonar.sourceEncoding=UTF-8
sonar.typescript.tsconfigPath=tsconfig.json

# Exclude generated/build artifacts from analysis entirely
sonar.exclusions=\
  **/dist/**,\
  **/build/**,\
  **/node_modules/**,\
  **/.replit/**,\
  **/coverage/**,\
  **/*.d.ts,\
  shared/schema.js,\
  shared/schema-runtime.js,\
  shared/schema-sqlite*.js,\
  shared/conflict-resolution-types.js

# CPD (Copy-Paste Detection) Exclusions
# Per SonarQube guidance: Exclude ONLY generated/test artifacts, not source code
# Categories:
#   1. Test files - intentional duplication for test isolation
#   2. SQLite schemas - intentional parity with PostgreSQL (offline mode)
#   3. Generated JS files - transpiled from TypeScript
#   4. Mock/fixture data - test data patterns
sonar.cpd.exclusions=\
  **/tests/**,\
  **/regression/**,\
  **/*.test.ts,\
  **/*.spec.ts,\
  **/__tests__/**,\
  **/sqlite-schema/**,\
  **/schema-sqlite*.ts,\
  **/schema-sqlite*.js,\
  shared/schema.js,\
  shared/schema-runtime.js,\
  **/fixtures.ts,\
  **/mock-data.ts,\
  **/fake-data/**,\
  **/dev-fake-data/**,\
  **/diagnostics-smoke-tests.ts

# Test file identification
sonar.tests=server/tests,client/tests,server/__tests__
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/__tests__/**

# Coverage reports (if available)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
